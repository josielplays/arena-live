<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Arena Live TikTok</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; font-family: sans-serif; }
        canvas { display: block; background-image: url('fundo.jpg'); background-size: cover; }
        #overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.8); padding: 20px; border-radius: 10px; color: white; text-align: center; z-index: 100; }
        input { padding: 10px; border-radius: 5px; border: none; margin-bottom: 10px; width: 200px; }
        button { padding: 10px 20px; background: #2ecc71; border: none; color: white; cursor: pointer; border-radius: 5px; font-weight: bold; }
        #status { position: absolute; top: 10px; left: 10px; color: #fff; font-size: 12px; z-index: 10; }
    </style>
</head>
<body>

<div id="status">Status: Desconectado</div>

<div id="overlay">
    <h2>Arena Interativa</h2>
    <p>Digite seu usuário do TikTok (sem @)</p>
    <input type="text" id="username" placeholder="ex: alinecristina.oficial">
    <br>
    <button id="connectBtn">CONECTAR E INICIAR</button>
</div>

<canvas id="arena"></canvas>

<script type="module">
    // Usaremos um servidor de proxy público para o navegador conseguir ler o TikTok
    import { WebcastPushConnection } from 'https://cdn.jsdelivr.net/npm/tiktok-live-connector-browser@latest/dist/tiktok-live-connector-browser.min.js';

    const canvas = document.getElementById('arena');
    const ctx = canvas.getContext('2d');
    const statusDiv = document.getElementById('status');
    let players = {};
    let connection;

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();

    document.getElementById('connectBtn').onclick = () => {
        const username = document.getElementById('username').value;
        if (!username) return alert("Digite o usuário!");

        statusDiv.innerText = "Conectando...";
        
        // Inicializa a conexão
        connection = new WebcastPushConnection(username);

        connection.connect().then(state => {
            statusDiv.innerText = `Conectado ao ID: ${state.roomId}`;
            document.getElementById('overlay').style.display = 'none';
            startArena();
        }).catch(err => {
            statusDiv.innerText = "Erro: " + err;
            console.error(err);
        });

        // Eventos da Live
        connection.on('chat', data => {
            console.log(`${data.uniqueId} disse: ${data.comment}`);
        });

        connection.on('gift', data => {
            spawnOrUpgrade(data.uniqueId, data.profilePictureUrl, 'gift', data.giftName);
        });

        connection.on('like', data => {
            spawnOrUpgrade(data.uniqueId, data.profilePictureUrl, 'like');
        });
    };

    function spawnOrUpgrade(id, pic, type, gift = "") {
        if (!players[id]) {
            players[id] = {
                id: id, x: Math.random() * canvas.width, y: Math.random() * canvas.height,
                size: 40, nivel: 1, angle: 0, img: new Image()
            };
            players[id].img.src = pic;
        }
        
        if (type === 'gift') {
            players[id].size += 2;
            if (gift.toLowerCase().includes("rosa")) players[id].nivel = 2;
        }
    }

    function startArena() {
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let id in players) {
                let p = players[id];
                p.angle += 0.05;
                
                // Desenha a "Serra" básica
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.angle);
                ctx.fillStyle = p.nivel > 1 ? "gold" : "silver";
                ctx.fillRect(-p.size-5, -p.size-5, (p.size+5)*2, (p.size+5)*2);
                ctx.restore();

                // Desenha a Foto
                ctx.save();
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.clip();
                if (p.img.complete) ctx.drawImage(p.img, p.x - p.size, p.y - p.size, p.size * 2, p.size * 2);
                ctx.restore();
            }
            requestAnimationFrame(draw);
        }
        draw();
    }
</script>

</body>
</html>
